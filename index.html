<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>зҝ»зүҢи®°еҝҶжёёжҲҸ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #e0e0e0;
    padding: 20px;
  }

  h1 {
    font-size: 2.2rem;
    margin: 16px 0 8px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    letter-spacing: 4px;
  }

  /* --- дҝЎжҒҜж Ҹ --- */
  .info-bar {
    display: flex;
    gap: 28px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    margin: 14px 0 18px;
    font-size: 1.05rem;
  }
  .info-bar .item {
    background: rgba(255,255,255,.08);
    padding: 8px 20px;
    border-radius: 12px;
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.12);
    min-width: 110px;
    text-align: center;
  }
  .info-bar .item span { font-weight: 700; color: #ffd200; }

  /* --- йҡҫеәҰйҖүжӢ© --- */
  .difficulty {
    display: flex; gap: 10px; margin-bottom: 12px;
  }
  .difficulty button {
    padding: 7px 22px;
    border: 2px solid rgba(255,255,255,.2);
    border-radius: 10px;
    background: transparent;
    color: #ccc;
    font-size: .95rem;
    cursor: pointer;
    transition: all .25s;
  }
  .difficulty button:hover { border-color: #ffd200; color: #ffd200; }
  .difficulty button.active {
    background: linear-gradient(135deg, #f7971e, #ffd200);
    color: #1a1a2e;
    border-color: transparent;
    font-weight: 700;
  }

  /* --- йҮҚж–°ејҖе§Ӣ --- */
  .restart-btn {
    padding: 10px 32px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    margin-bottom: 16px;
    letter-spacing: 2px;
  }
  .restart-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(118,75,162,.5);
  }
  .restart-btn:active { transform: scale(.96); }

  /* --- жЈӢзӣҳ --- */
  .board {
    display: grid;
    gap: 12px;
    perspective: 1200px;
    max-width: 720px;
    width: 100%;
    justify-content: center;
  }
  .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .board.cols-6 { grid-template-columns: repeat(6, 1fr); }

  /* --- еҚЎзүҢеӨ–еұӮпјҲжүҝиҪҪе…ҘеңәеҠЁз”»пјҢдёҚе№Іжү°зҝ»иҪ¬пјү --- */
  .card-wrapper {
    aspect-ratio: 3 / 4;
    perspective: 1200px;
    cursor: pointer;
  }

  /* --- еҚЎзүҢ --- */
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform .45s cubic-bezier(.4,.0,.2,1);
    border-radius: 14px;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.matched { pointer-events: none; }
  .card.matched .card-front {
    box-shadow: 0 0 18px 4px rgba(76,217,100,.45);
    border-color: #4cd964;
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(255,255,255,.15);
  }

  .card-back {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-size: 2.2rem;
    color: rgba(255,255,255,.25);
    z-index: 2;
  }
  .card-back::after { content: '?'; font-weight: 700; }

  .card-front {
    background: rgba(255,255,255,.07);
    backdrop-filter: blur(8px);
    transform: rotateY(180deg);
    font-size: 2.8rem;
    transition: box-shadow .3s, border-color .3s;
  }

  /* --- еј№еұӮ --- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .modal {
    background: linear-gradient(135deg, #1e1e30, #2a2a50);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    border: 1px solid rgba(255,255,255,.15);
    transform: scale(.8);
    transition: transform .4s cubic-bezier(.4,.0,.2,1);
  }
  .overlay.show .modal { transform: scale(1); }

  .modal h2 {
    font-size: 2rem;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .modal p { margin: 8px 0; font-size: 1.1rem; line-height: 1.7; }
  .modal p span { color: #ffd200; font-weight: 700; }
  .modal .restart-btn { margin-top: 20px; }

  /* --- е…ҘеңәеҠЁз”»пјҲдҪңз”ЁеңЁ wrapper дёҠпјҢдёҚе№Іжү° card зҡ„зҝ»иҪ¬пјү --- */
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(.85); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-wrapper.enter { animation: cardIn .35s ease-out both; }

  /* --- й…ҚеҜ№жҲҗеҠҹжҠ–еҠЁ --- */
  @keyframes pop {
    0%   { transform: rotateY(180deg) scale(1); }
    40%  { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  .card.match-anim { animation: pop .4s ease; }

  /* е“Қеә”ејҸ */
  @media (max-width: 520px) {
    h1 { font-size: 1.5rem; }
    .info-bar { gap: 10px; font-size: .9rem; }
    .info-bar .item { padding: 6px 12px; min-width: 80px; }
    .board { gap: 8px; }
    .card-front { font-size: 2rem; }
    .card-back { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<h1>зҝ» зүҢ и®° еҝҶ</h1>

<div class="difficulty">
  <button data-pairs="6" class="active">з®ҖеҚ• (6еҜ№)</button>
  <button data-pairs="9">дёӯзӯү (9еҜ№)</button>
  <button data-pairs="12">еӣ°йҡҫ (12еҜ№)</button>
</div>

<div class="info-bar">
  <div class="item">вҸұ ж—¶й—ҙ <span id="timer">00:00</span></div>
  <div class="item">рҹҺҜ еҫ—еҲҶ <span id="score">0</span></div>
  <div class="item">вң… й…ҚеҜ№ <span id="pairs">0 / 6</span></div>
</div>

<button class="restart-btn" onclick="restartGame()">йҮҚж–°ејҖе§Ӣ</button>

<div class="board cols-4" id="board"></div>

<!-- е®ҢжҲҗеј№еұӮ -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>рҹҺү жҒӯе–ңйҖҡе…іпјҒ</h2>
    <p>жҖ»з”Ёж—¶пјҡ<span id="finalTime">00:00</span></p>
    <p>жңҖз»Ҳеҫ—еҲҶпјҡ<span id="finalScore">0</span></p>
    <button class="restart-btn" onclick="restartGame()">еҶҚжқҘдёҖеұҖ</button>
  </div>
</div>

<script>
// ====== еҚЎзүҢ Emoji жұ  ======
const EMOJI_POOL = [
  'рҹҗ¶','рҹҗұ','рҹҗј','рҹҰҠ','рҹҗё','рҹҗө',
  'рҹҰҒ','рҹҗҜ','рҹҗЁ','рҹҗ°','рҹҗ»','рҹҗ·',
  'рҹҢ»','рҹҚҖ','рҹҢҲ','вӯҗ','рҹ”Ҙ','рҹ’Һ',
  'рҹҺҲ','рҹҺө','рҹҚ•','рҹҚ©','рҹҡҖ','рҹҺІ'
];

// ====== зҠ¶жҖҒ ======
let totalPairs = 6;
let cards = [];
let flipped = [];        // еҪ“еүҚе·Ізҝ»ејҖдё”жңӘеҢ№й…Қзҡ„еҚЎзүҢзҙўеј•
let matchedCount = 0;
let score = 0;
let lockBoard = false;
let timerHandle = null;
let seconds = 0;
let gameStarted = false;

// ====== DOM ======
const boardEl    = document.getElementById('board');
const timerEl    = document.getElementById('timer');
const scoreEl    = document.getElementById('score');
const pairsEl    = document.getElementById('pairs');
const overlayEl  = document.getElementById('overlay');
const finalTimeEl  = document.getElementById('finalTime');
const finalScoreEl = document.getElementById('finalScore');

// ====== йҡҫеәҰжҢүй’® ======
document.querySelectorAll('.difficulty button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.difficulty .active').classList.remove('active');
    btn.classList.add('active');
    totalPairs = parseInt(btn.dataset.pairs);
    restartGame();
  });
});

// ====== е·Ҙе…· ======
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function formatTime(s) {
  const m = String(Math.floor(s / 60)).padStart(2, '0');
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

// ====== и®Ўж—¶еҷЁ ======
function startTimer() {
  if (gameStarted) return;
  gameStarted = true;
  timerHandle = setInterval(() => {
    seconds++;
    timerEl.textContent = formatTime(seconds);
  }, 1000);
}

function stopTimer() {
  clearInterval(timerHandle);
  timerHandle = null;
}

// ====== еҲқе§ӢеҢ– ======
function initGame() {
  const chosen = shuffle([...EMOJI_POOL]).slice(0, totalPairs);
  cards = shuffle([...chosen, ...chosen]);
  matchedCount = 0;
  score = 0;
  seconds = 0;
  flipped = [];
  lockBoard = false;
  gameStarted = false;
  stopTimer();
  timerEl.textContent = '00:00';
  scoreEl.textContent = '0';
  pairsEl.textContent = `0 / ${totalPairs}`;
  overlayEl.classList.remove('show');

  // зҪ‘ж јеҲ—ж•°
  const total = cards.length;
  boardEl.className = 'board';
  if (total <= 12) boardEl.classList.add('cols-4');
  else boardEl.classList.add('cols-6');

  boardEl.innerHTML = '';
  cards.forEach((emoji, i) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper enter';
    wrapper.style.animationDelay = `${i * 40}ms`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-face card-back"></div>
      <div class="card-face card-front">${emoji}</div>`;
    card.addEventListener('click', () => onCardClick(i));
    wrapper.appendChild(card);
    boardEl.appendChild(wrapper);
  });
}

// ====== зҝ»зүҢйҖ»иҫ‘ ======
function onCardClick(index) {
  if (lockBoard) return;
  const wrapper = boardEl.children[index];
  const cardEl = wrapper ? wrapper.querySelector('.card') : null;
  if (!cardEl || cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;

  startTimer();
  cardEl.classList.add('flipped');
  flipped.push(index);

  if (flipped.length === 2) {
    lockBoard = true;
    const [a, b] = flipped;
    if (cards[a] === cards[b]) {
      // й…ҚеҜ№жҲҗеҠҹ
      score += Math.max(10, 30 - Math.floor(seconds / 10));
      matchedCount++;
      scoreEl.textContent = score;
      pairsEl.textContent = `${matchedCount} / ${totalPairs}`;
      setTimeout(() => {
        const ca = boardEl.children[a].querySelector('.card');
        const cb = boardEl.children[b].querySelector('.card');
        ca.classList.add('matched', 'match-anim');
        cb.classList.add('matched', 'match-anim');
        flipped = [];
        lockBoard = false;
        if (matchedCount === totalPairs) onWin();
      }, 350);
    } else {
      // й…ҚеҜ№еӨұиҙҘпјҢзҝ»еӣһ
      setTimeout(() => {
        boardEl.children[a].querySelector('.card').classList.remove('flipped');
        boardEl.children[b].querySelector('.card').classList.remove('flipped');
        flipped = [];
        lockBoard = false;
      }, 800);
    }
  }
}

// ====== иғңеҲ© ======
function onWin() {
  stopTimer();
  finalTimeEl.textContent = formatTime(seconds);
  finalScoreEl.textContent = score;
  setTimeout(() => overlayEl.classList.add('show'), 500);
}

// ====== йҮҚж–°ејҖе§Ӣ ======
function restartGame() {
  initGame();
}

// ====== еҗҜеҠЁ ======
initGame();
</script>
</body>
</html>
